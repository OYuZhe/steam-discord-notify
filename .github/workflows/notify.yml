name: Steam 中文更新通知

on:
  schedule:
    - cron: '0 1 * * *'  # 每天 09:00 台灣時間（UTC+8）
  workflow_dispatch:      # 保留手動觸發方便測試

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl

      - name: Run notify
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
        run: php notify.php

      - name: Commit updated files
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add languages.json meta.json
          git diff --staged --quiet || git commit -m "chore: update language data [skip ci]"
          git push
